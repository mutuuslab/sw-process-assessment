<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>손에 잡히는 SW 개발 프로세스 · 이해도 평가</title>
<style>
  :root{
    --navy:#0b2545; --navy2:#13315c; --blue:#1d6fb8; --sky:#3aa0ff; --accent:#00b3a4;
    --bg:#eef2f7; --card:#ffffff; --line:#e2e8f0; --txt:#1b2733; --muted:#64748b;
    --ok:#16a34a; --okbg:#e9f9ef; --no:#dc2626; --nobg:#fdecec; --warn:#d97706;
    --gold:#f5b301; --shadow:0 10px 30px rgba(11,37,69,.10);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"Pretendard","Malgun Gothic","맑은 고딕",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:linear-gradient(180deg,#f5f8fc 0%,#eef2f7 100%);color:var(--txt);
    -webkit-font-smoothing:antialiased; line-height:1.6;
  }
  .wrap{max-width:920px;margin:0 auto;padding:24px 18px 80px}
  .dash-wrap{max-width:1200px}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  .hidden{display:none!important}

  /* Top bar */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}
  .brand{display:flex;align-items:center;gap:12px}
  .brand .logo{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--navy),var(--blue));
    display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:20px;box-shadow:var(--shadow)}
  .brand h1{font-size:16px;margin:0;font-weight:800;letter-spacing:-.3px}
  .brand p{font-size:12px;margin:0;color:var(--muted)}
  .pillbtn{font-size:13px;color:var(--navy);background:#fff;border:1px solid var(--line);
    padding:8px 14px;border-radius:999px;font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,.04)}
  .pillbtn:hover{border-color:var(--blue);color:var(--blue)}

  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:28px}

  /* Home */
  .hero{text-align:center;padding:38px 24px 30px}
  .hero .badge{display:inline-block;background:#e7f0fb;color:var(--blue);font-weight:700;font-size:12px;
    padding:6px 14px;border-radius:999px;letter-spacing:.3px;margin-bottom:16px}
  .hero h2{font-size:30px;margin:6px 0 8px;letter-spacing:-.6px;line-height:1.25}
  .hero h2 .hl{background:linear-gradient(180deg,transparent 60%,#bfe3ff 60%)}
  .hero .sub{color:var(--muted);font-size:15px;max-width:560px;margin:0 auto 22px}
  .metrics{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:22px 0 26px}
  .metric{background:#f7fafe;border:1px solid var(--line);border-radius:14px;padding:14px 20px;min-width:120px}
  .metric .n{font-size:22px;font-weight:800;color:var(--navy)}
  .metric .l{font-size:12px;color:var(--muted)}
  .namebox{max-width:420px;margin:0 auto}
  .namebox label{display:block;text-align:left;font-size:13px;font-weight:700;color:var(--navy2);margin-bottom:6px}
  .input{width:100%;padding:14px 16px;border:1.5px solid var(--line);border-radius:12px;font-size:15px;outline:none}
  .input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(29,111,184,.12)}
  .cta{width:100%;margin-top:14px;background:linear-gradient(135deg,var(--blue),var(--navy));color:#fff;
    font-size:16px;font-weight:800;padding:16px;border-radius:14px;box-shadow:var(--shadow);transition:transform .08s}
  .cta:hover{transform:translateY(-1px)}
  .cta:active{transform:translateY(0)}
  .ghost{background:#fff;color:var(--navy);border:1.5px solid var(--line);font-weight:700;padding:13px;border-radius:12px;width:100%;margin-top:10px}
  .ghost:hover{border-color:var(--blue);color:var(--blue)}
  .scope{margin-top:26px;text-align:left;background:#f7fafe;border-radius:14px;padding:18px 20px;border:1px solid var(--line)}
  .scope h4{margin:0 0 10px;font-size:13px;color:var(--navy);letter-spacing:.2px}
  .scope .tags{display:flex;flex-wrap:wrap;gap:8px}
  .tag{font-size:12px;background:#fff;border:1px solid var(--line);color:var(--navy2);padding:5px 11px;border-radius:999px}

  /* Quiz */
  .qhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px}
  .progress-outer{flex:1;height:10px;background:#e6edf5;border-radius:999px;overflow:hidden}
  .progress-inner{height:100%;background:linear-gradient(90deg,var(--accent),var(--sky));width:0;transition:width .4s ease}
  .qmeta{display:flex;gap:8px;align-items:center;font-size:13px;color:var(--muted);white-space:nowrap}
  .streak{display:flex;align-items:center;gap:5px;font-weight:800;color:var(--warn);font-size:14px}
  .scorechip{font-weight:800;color:var(--navy)}
  .areachip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--blue);
    background:#e7f0fb;padding:5px 12px;border-radius:999px;margin-bottom:14px}
  .diff{font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;margin-left:6px}
  .diff.하{background:#e9f9ef;color:#15803d}.diff.중{background:#fef3e2;color:#b45309}.diff.상{background:#fdecec;color:#b91c1c}
  .qtext{font-size:19px;font-weight:700;line-height:1.5;margin:4px 0 20px;letter-spacing:-.3px}
  .opt{display:flex;align-items:flex-start;gap:14px;width:100%;text-align:left;background:#fff;border:1.5px solid var(--line);
    border-radius:14px;padding:16px 18px;margin-bottom:11px;transition:all .12s;font-size:15.5px;color:var(--txt)}
  .opt:hover:not(:disabled){border-color:var(--blue);background:#f7fbff}
  .opt .num{flex:none;width:28px;height:28px;border-radius:50%;background:#eef2f7;color:var(--navy2);
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px}
  .opt.correct{border-color:var(--ok);background:var(--okbg)}
  .opt.correct .num{background:var(--ok);color:#fff}
  .opt.wrong{border-color:var(--no);background:var(--nobg)}
  .opt.wrong .num{background:var(--no);color:#fff}
  .opt.dim{opacity:.55}
  .opt:disabled{cursor:default}

  /* Feedback */
  .fb{margin-top:6px;border-radius:16px;padding:18px 18px 16px;border:1.5px solid;animation:pop .25s ease}
  @keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .fb.good{background:var(--okbg);border-color:#bbf0cd}
  .fb.bad{background:var(--nobg);border-color:#f8c9c9}
  .fb-head{display:flex;align-items:center;gap:10px;font-weight:800;font-size:15px;margin-bottom:8px}
  .fb .ava{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;color:#fff;flex:none}
  .fb.good .ava{background:var(--ok)}.fb.bad .ava{background:var(--no)}
  .fb p{margin:8px 0;font-size:14.5px}
  .fb .lbl{font-weight:800;font-size:12px;letter-spacing:.3px;color:var(--navy2);text-transform:uppercase}
  .fb .rw{background:#fff;border:1px dashed #cdd8e6;border-radius:10px;padding:11px 13px;margin-top:10px;font-size:13.5px;color:var(--navy2)}
  .fb .rw b{color:var(--accent)}
  .nextbtn{margin-top:14px;background:var(--navy);color:#fff;font-weight:800;padding:13px 22px;border-radius:12px;float:right}
  .nextbtn:hover{background:var(--blue)}
  .clearfix::after{content:"";display:table;clear:both}

  /* AI ask */
  .aiask{margin-top:14px;border-top:1px dashed var(--line);padding-top:12px}
  .aiask textarea{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:10px;font-family:inherit;font-size:13.5px;resize:vertical;min-height:46px}
  .aiask .row{display:flex;gap:8px;margin-top:8px}
  .aiask .askbtn{background:var(--accent);color:#fff;font-weight:700;padding:9px 16px;border-radius:10px;font-size:13px}
  .ai-resp{margin-top:10px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px;font-size:13.5px;white-space:pre-wrap}

  /* Result */
  .result-top{text-align:center;padding:14px 0 6px}
  .donut{width:170px;height:170px;margin:8px auto 6px;position:relative}
  .donut svg{transform:rotate(-90deg)}
  .donut .ctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .donut .ctr .big{font-size:40px;font-weight:800;color:var(--navy);line-height:1}
  .donut .ctr .small{font-size:12px;color:var(--muted)}
  .grade{display:inline-block;font-weight:800;font-size:15px;padding:6px 18px;border-radius:999px;margin-top:6px}
  .report{margin-top:22px;background:#f7fafe;border:1px solid var(--line);border-radius:16px;padding:20px}
  .report h3{margin:0 0 6px;font-size:16px;color:var(--navy);display:flex;align-items:center;gap:8px}
  .report .by{font-size:12px;color:var(--muted);margin-bottom:12px}
  .report .seg{margin:14px 0;font-size:14.5px}
  .report .seg b{color:var(--navy2)}
  .barrow{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:13px}
  .barrow .nm{width:130px;flex:none;color:var(--navy2);font-weight:600}
  .barrow .tk{flex:1;height:14px;background:#e6edf5;border-radius:999px;overflow:hidden}
  .barrow .tk>div{height:100%;border-radius:999px}
  .barrow .vv{width:42px;text-align:right;font-weight:700;font-size:12px;color:var(--muted)}
  .reco{background:#fff;border-left:4px solid var(--accent);border-radius:8px;padding:12px 14px;margin:8px 0;font-size:13.8px}
  .reco b{color:var(--accent)}
  .btnrow{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
  .btnrow button{flex:1;min-width:140px}

  /* Review */
  .rev{border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:12px;background:#fff}
  .rev .rh{display:flex;justify-content:space-between;gap:10px;font-weight:700;font-size:14px}
  .rev .tagok{color:var(--ok);font-weight:800}.rev .tagno{color:var(--no);font-weight:800}
  .rev .q{margin:8px 0;font-size:14.5px;font-weight:600}
  .rev .ln{font-size:13.5px;margin:3px 0}
  .rev .ln .pk{color:var(--no);font-weight:700}.rev .ln .an{color:var(--ok);font-weight:700}
  .rev .ex{margin-top:8px;background:#f7fafe;border-radius:9px;padding:10px 12px;font-size:13px;color:var(--navy2)}

  /* Dashboard */
  .dgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
  .stat{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.03)}
  .stat .n{font-size:28px;font-weight:800;color:var(--navy)}
  .stat .l{font-size:12.5px;color:var(--muted)}
  .panel{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px;margin-bottom:18px}
  .panel h3{margin:0 0 14px;font-size:15px;color:var(--navy)}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{padding:10px 8px;text-align:left;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:700;font-size:12px;cursor:pointer;user-select:none}
  tbody tr:hover{background:#f7fafe;cursor:pointer}
  .scoretag{font-weight:800;padding:2px 9px;border-radius:999px;font-size:12px}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
  .toolbar .grow{flex:1}
  .danger{color:var(--no);border:1.5px solid #f4c4c4;background:#fff;padding:9px 14px;border-radius:10px;font-weight:700;font-size:13px}
  .danger:hover{background:var(--nobg)}
  .modal{position:fixed;inset:0;background:rgba(11,37,69,.5);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50}
  .modal .box{background:#fff;border-radius:18px;max-width:760px;width:100%;max-height:88vh;overflow:auto;padding:26px;box-shadow:var(--shadow)}
  .modal .x{float:right;font-size:22px;color:var(--muted);font-weight:700}
  .empty{text-align:center;color:var(--muted);padding:40px 0;font-size:14px}
  .confetti{position:fixed;top:-10px;width:10px;height:14px;z-index:60;pointer-events:none;border-radius:2px}
  @media(max-width:760px){.dgrid{grid-template-columns:repeat(2,1fr)}.hero h2{font-size:24px}}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;
    padding:12px 22px;border-radius:12px;font-size:14px;font-weight:600;box-shadow:var(--shadow);z-index:80;animation:pop .25s}
  .settings-row{display:flex;flex-direction:column;gap:8px;margin:10px 0}
  .small{font-size:12px;color:var(--muted)}
  a.link{color:var(--blue);font-weight:600;text-decoration:none}
</style>
</head>
<body>
<div class="wrap" id="root"></div>

<script>
/* =========================================================================
   문항 데이터 — 현대자동차 구매본부 「손에 잡히는 SW 개발 프로세스」 이해도 평가
   원본: 이해도_평가.docx (10문항 / 문항당 10점 / 100점 만점)
   각 문항에는 정답·해설 외에 (1)오답별 진단, (2)구매 실무 적용 포인트를 추가하여
   AI 코치가 학습 취지(협력사 SW 품질 점검·관리 역량)에 맞춰 피드백하도록 구성
   ========================================================================= */
const QUESTIONS = [
  {
    id:1, area:"V-모델", diff:"하",
    q:"SW 개발 흐름을 표현하는 V-모델에서 왼쪽 단계(요구사항·설계)와 오른쪽 단계(테스트)의 가장 핵심적인 관계는 무엇인가?",
    options:[
      "오른쪽 테스트 단계는 왼쪽 단계와 무관하게 자유롭게 설계한다",
      "왼쪽의 각 단계(요구·설계)는 오른쪽의 대응되는 테스트 단계로 검증된다",
      "왼쪽 단계가 끝나면 오른쪽 단계는 생략할 수 있다",
      "오른쪽 테스트는 코딩이 끝난 뒤에만 한 번 수행한다"
    ],
    answer:1,
    core:"V-모델의 핵심은 왼쪽 '정의' 단계와 오른쪽 '검증' 단계가 같은 높이에서 1:1로 대응한다는 점입니다. (요구사항↔인수시험, 아키텍처설계↔통합시험, 상세설계↔단위시험)",
    why:[
      "테스트를 요구·설계와 무관하게 만들면, '무엇을 근거로 합격을 판정했는가'가 사라집니다. 구매 점검에서 가장 먼저 깨지는 추적성입니다.",
      "정답입니다. 왼쪽에서 정한 것을 오른쪽 같은 레벨에서 되받아 검증하는 대응 구조가 V-모델의 본질입니다.",
      "오른쪽(검증)을 생략하면 '정의한 것이 실제로 충족됐는지' 확인할 길이 없어집니다. 생략 불가입니다.",
      "테스트는 마지막에 한 번이 아니라 단위→통합→시스템→인수까지 레벨별로 수행됩니다."
    ],
    realworld:"구매 담당자는 협력사 산출물을 받을 때 '이 테스트가 어느 요구/설계 항목을 검증하는가'를 항상 되물어야 합니다. 대응 관계가 비어 있으면 그게 곧 점검 지적사항입니다."
  },
  {
    id:2, area:"ASPICE", diff:"하",
    q:"ASPICE(자동차 SW 프로세스 평가 모델)의 주된 목적으로 가장 적절한 것은?",
    options:[
      "협력사의 코드 라인 수를 측정해 개발비를 산정하는 것",
      "SW 개발·관리 프로세스의 성숙도(역량)를 평가하고 개선하는 것",
      "차량의 연비를 인증하는 것",
      "완성차의 디자인 품질을 심사하는 것"
    ],
    answer:1,
    core:"ASPICE(Automotive SPICE)는 협력사의 'SW를 만드는 과정(프로세스)'이 얼마나 체계적이고 반복 가능한지, 그 성숙도(Capability Level)를 평가하고 개선시키기 위한 모델입니다.",
    why:[
      "코드 라인 수로 개발비를 추정하는 것은 COCOMO 같은 '규모 산정' 기법의 영역이지 ASPICE가 아닙니다.",
      "정답입니다. ASPICE는 결과물 하나가 아니라 '프로세스 역량(Level 1~5)'을 본다는 점이 핵심입니다.",
      "연비 인증은 별도의 시험·인증 체계로, SW 프로세스 평가와 무관합니다.",
      "디자인(외관) 품질 심사와도 무관합니다."
    ],
    realworld:"협력사 선정·관리 시 'ASPICE Level 2 이상' 같은 요건을 거는 이유가 바로 이것입니다. 결과물뿐 아니라 '만드는 방식'이 안정적인지를 보장받기 위함입니다."
  },
  {
    id:3, area:"기능안전(ISO 26262)", diff:"하",
    q:"ISO 26262 '기능안전(Functional Safety)'이 다루는 핵심 관심사는 무엇인가?",
    options:[
      "전자·전기(E/E) 시스템 오작동으로 인한 위험(해저드)을 허용 수준까지 줄이는 것",
      "SW의 화면 색상과 폰트 가독성을 규정하는 것",
      "협력사 직원의 근무 안전(산업안전)을 관리하는 것",
      "차량 도장(페인트)의 내구성을 인증하는 것"
    ],
    answer:0,
    core:"ISO 26262 기능안전은 차량 전자·전기(E/E) 시스템의 '오작동(malfunction)'이 인명 위험으로 이어지지 않도록, 위험(해저드)을 허용 가능한 수준까지 낮추는 것을 목표로 합니다.",
    why:[
      "정답입니다. 핵심 키워드는 'E/E 오작동 → 위험 → 허용 수준까지 감소'입니다.",
      "화면 색상·폰트는 사용성(UX) 영역이지 기능안전이 아닙니다.",
      "가장 흔한 혼동입니다. '근무 안전(산업안전)'이 아니라 '제품이 오작동해도 안전한가'를 다룹니다.",
      "도장 내구성은 기능안전과 무관합니다."
    ],
    realworld:"구매 점검에서 ISO 26262는 'ASIL 등급이 제대로 할당됐는가', '안전요구사항이 검증·추적되는가'로 이어집니다. '직원 안전관리'와 헷갈리지 않는 것이 출발점입니다."
  },

function saveSettings(s){ localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); }
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function fmtDate(ts){ const d=new Date(ts); const p=n=>String(n).padStart(2,"0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`; }
function fmtDur(s){ const m=Math.floor(s/60), ss=s%60; return `${m}분 ${ss}초`; }
function gradeOf(score){
  if(score>=90)return{g:"A · 우수",c:"#15803d",bg:"#e9f9ef",msg:"협력사 SW 품질을 직접 점검·리드할 수 있는 수준입니다."};
  if(score>=PASS_SCORE)return{g:"B · 합격",c:"#1d6fb8",bg:"#e7f0fb",msg:"핵심 개념을 잘 이해했습니다. 약점 영역만 보완하면 실무 적용이 충분합니다."};
  if(score>=50)return{g:"C · 보완 필요",c:"#b45309",bg:"#fef3e2",msg:"기본기는 있으나 점검 실무에 바로 쓰기엔 보완이 필요합니다."};
  return{g:"D · 재학습 권장",c:"#b91c1c",bg:"#fdecec",msg:"핵심 개념부터 다시 학습한 뒤 재응시를 권장합니다."};
}
function toast(msg){
  const t=document.createElement("div"); t.className="toast"; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),2200);
}
function confetti(){
  const colors=["#1d6fb8","#00b3a4","#f5b301","#3aa0ff","#16a34a"];
  for(let i=0;i<90;i++){
    const c=document.createElement("div"); c.className="confetti";
    c.style.left=Math.random()*100+"vw"; c.style.background=colors[i%colors.length];
    c.style.transform=`rotate(${Math.random()*360}deg)`;
    const dur=2+Math.random()*1.5;
    c.animate([{transform:`translateY(-10px) rotate(0)`,opacity:1},
      {transform:`translateY(105vh) rotate(${720*(Math.random()>.5?1:-1)}deg)`,opacity:.9}],
      {duration:dur*1000,easing:"cubic-bezier(.4,.2,.6,1)"});
    document.body.appendChild(c); setTimeout(()=>c.remove(),dur*1000);
  }
}

/* =======================================================================
   QUIZ
======================================================================= */
function renderQuiz(){
  const q=QUESTIONS[state.idx];
  const pct=Math.round((state.idx)/TOTAL*100);
  const score=state.answers.reduce((a,x)=>a+(x.correct?10:0),0);
  let streak=0; for(let i=state.answers.length-1;i>=0;i--){ if(state.answers[i].correct)streak++; else break; }
  root.innerHTML = `
  ${topbar(true)}
  <div class="card">
    <div class="qhead">
      <div class="progress-outer"><div class="progress-inner" style="width:${pct}%"></div></div>
      <div class="qmeta">
        ${streak>=2?`<span class="streak">🔥 ${streak}연속</span>`:""}
        <span class="scorechip">${score}점</span>
        <span>${state.idx+1} / ${TOTAL}</span>
      </div>
    </div>
    <span class="areachip">🎯 ${q.area}<span class="diff ${q.diff}">난이도 ${q.diff}</span></span>
    <div class="qtext">${state.idx+1}. ${esc(q.q)}</div>
    <div id="opts">
      ${q.options.map((o,i)=>`
        <button class="opt" data-i="${i}">
          <span class="num">${NUM[i]}</span><span>${esc(o)}</span>
        </button>`).join("")}
    </div>
    <div id="fbZone"></div>
  </div>`;
  bindTop();
  document.querySelectorAll(".opt").forEach(b=>{
    b.onclick=()=>onPick(parseInt(b.dataset.i));
  });
}

function onPick(i){
  if(state.locked)return;
  state.locked=true; state.picked=i;
  const q=QUESTIONS[state.idx];
  const correct = i===q.answer;
  state.answers[state.idx]={qid:q.id,picked:i,correct,area:q.area,diff:q.diff};
  // 시각 표시
  document.querySelectorAll(".opt").forEach(b=>{
    const bi=parseInt(b.dataset.i); b.disabled=true;
    if(bi===q.answer)b.classList.add("correct");
    else if(bi===i)b.classList.add("wrong");
    else b.classList.add("dim");
  });
  if(correct)confetti();
  renderFeedback(correct);
}

function renderFeedback(correct){
  const q=QUESTIONS[state.idx];
  const i=state.picked;
  const last = state.idx===TOTAL-1;
  const goodMsgs=["정확합니다! 👏","좋아요, 제대로 짚었습니다.","훌륭합니다. 핵심을 잡으셨네요."];
  const badMsgs =["아쉽지만 다시 볼까요.","괜찮아요, 여기서 확실히 잡고 가요.","이 부분이 자주 헷갈립니다."];
  const head = correct? goodMsgs[state.idx%goodMsgs.length] : badMsgs[state.idx%badMsgs.length];
  const set=loadSettings();
  const fb=$("#fbZone");
  fb.innerHTML=`
    <div class="fb ${correct?"good":"bad"}">
      <div class="fb-head"><span class="ava">${correct?"🤖":"🤖"}</span>
        <span>AI 학습 코치 · ${head}</span></div>
      ${!correct?`<p><span class="lbl">내 선택 ${NUM[i]}</span> &nbsp;${esc(q.why[i])}</p>`:""}
      <p><span class="lbl">정답 ${NUM[q.answer]}</span> &nbsp;${esc(q.why[q.answer])}</p>
      <p style="margin-top:10px">${esc(q.core)}</p>
      <div class="rw"><b>💼 구매 실무 포인트</b><br>${esc(q.realworld)}</div>
      ${set.apiKey?aiAskBox():""}
      <div class="clearfix">
        <button class="nextbtn" id="nextBtn">${last?"결과 보기 →":"다음 문항 →"}</button>
      </div>
    </div>`;
  if(set.apiKey)bindAiAsk();
  $("#nextBtn").onclick=()=>{
    if(last){ finishQuiz(); }
    else { state.idx++; state.locked=false; state.picked=null; render(); window.scrollTo({top:0,behavior:"smooth"}); }
  };
  fb.scrollIntoView({behavior:"smooth",block:"nearest"});
}

/* 선택적 Claude API 추가질문 */
function aiAskBox(){
  return `<div class="aiask">
    <div class="lbl">🤔 더 궁금한 점이 있나요? AI 튜터에게 추가 질문</div>
    <textarea id="aiQ" placeholder="예: 이 개념이 실제 협력사 점검에서 어떻게 쓰이나요?"></textarea>
    <div class="row"><button class="askbtn" id="aiAskBtn">질문 보내기</button></div>
    <div id="aiResp"></div>
  </div>`;
}
function bindAiAsk(){
  const btn=$("#aiAskBtn"); if(!btn)return;
  btn.onclick=async()=>{
    const qtext=$("#aiQ").value.trim(); if(!qtext)return;
    const resp=$("#aiResp"); resp.innerHTML=`<div class="ai-resp">⏳ AI 튜터가 답변을 작성 중입니다...</div>`;
    const q=QUESTIONS[state.idx];
    try{
      const ans=await askClaude(q,qtext);
      resp.innerHTML=`<div class="ai-resp"><b>🤖 AI 튜터</b><br>${esc(ans)}</div>`;
    }catch(e){
      resp.innerHTML=`<div class="ai-resp" style="color:var(--no)">⚠ 호출 실패: ${esc(e.message)}<br><span class="small">설정에서 API 키와 네트워크를 확인하세요. (내장형 해설은 위 내용으로 충분합니다.)</span></div>`;
    }
  };
}
async function askClaude(q,userQ){
  const set=loadSettings();
  const model=set.model||"claude-opus-4-8";
  const sys=`당신은 현대자동차 구매본부 직원을 위한 SW 개발 프로세스 교육의 친절한 AI 튜터입니다.
교육 취지: 구매 담당자가 협력사의 SW 품질을 점검·관리하는 실무 역량을 기르는 것.
답변은 한국어로, 3~5문장 이내로 간결하고 실무적으로. 협력사 점검 관점을 항상 곁들이세요.`;
  const ctx=`[문항] ${q.q}\n[정답] ${NUM[q.answer]} ${q.options[q.answer]}\n[핵심해설] ${q.core}\n[학습자 질문] ${userQ}`;
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"content-type":"application/json","x-api-key":set.apiKey,
      "anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model,max_tokens:500,system:sys,messages:[{role:"user",content:ctx}]})
  });
  if(!res.ok){ const t=await res.text(); throw new Error(res.status+" "+t.slice(0,120)); }
  const data=await res.json();
  return (data.content&&data.content[0]&&data.content[0].text)||"(빈 응답)";
}

function finishQuiz(){
  const finishedAt=Date.now();
  const durationSec=Math.round((finishedAt-state.startedAt)/1000);
  const score=state.answers.reduce((a,x)=>a+(x.correct?10:0),0);
  const perArea={};
  state.answers.forEach(a=>{ perArea[a.area]=perArea[a.area]||{ok:0,n:0}; perArea[a.area].n++; if(a.correct)perArea[a.area].ok++; });
  const rec={ name:state.name, startedAt:state.startedAt, finishedAt, durationSec, score,
    answers:state.answers, perArea, total:TOTAL };
  const all=loadResults(); all.push(rec); saveResults(all);
  state.lastRec=rec; state.view="result"; render(); window.scrollTo({top:0,behavior:"smooth"});
  if(score>=PASS_SCORE)setTimeout(confetti,150);
}

function buildReport(r){
  // 영역별 정답률
  const areas=Object.entries(r.perArea).map(([k,v])=>({k,ok:v.ok,n:v.n,p:Math.round(v.ok/v.n*100)}));
  const weak=areas.filter(a=>a.p<100);
  const strong=areas.filter(a=>a.p===100);
  const bars=areas.map(a=>{
    const col=a.p===100?"linear-gradient(90deg,#16a34a,#3ddc84)":a.p>=50?"linear-gradient(90deg,#f5b301,#ffce5a)":"linear-gradient(90deg,#dc2626,#f87171)";
    return `<div class="barrow"><span class="nm">${esc(a.k)}</span>
      <span class="tk"><div style="width:${a.p}%;background:${col}"></div></span>
      <span class="vv">${a.ok}/${a.n}</span></div>`;
  }).join("");
  // 추천
  let reco="";
  if(weak.length===0){
    reco=`<div class="reco">🎉 <b>모든 영역 만점!</b> 협력사 SW 품질 점검의 핵심 개념을 고르게 이해하고 있습니다. 실무에서는 <b>Q10 유형(종합 판단)</b>처럼 여러 결손이 겹친 상황의 의사결정을 계속 연습해 보세요.</div>`;
  }else{
    reco=weak.map(a=>`<div class="reco"><b>보완 추천 · ${esc(a.k)}</b><br>${recoText(a.k)}</div>`).join("");
  }
  const g=gradeOf(r.score);
  return `<div class="report">
    <h3>🤖 AI 학습 코치 · 개인별 진단 리포트</h3>
    <div class="by">${esc(r.name)} 님 · ${fmtDate(r.finishedAt)} · 학습 취지: 협력사 SW 품질 점검·관리 역량</div>
    <div class="seg"><b>종합 진단.</b> ${r.score}점(${g.g.split("·")[1].trim()}). ${g.msg}
      ${strong.length?` 특히 <b>${strong.map(s=>esc(s.k)).join(", ")}</b> 영역은 확실하게 이해하고 있습니다.`:""}</div>
    <div class="seg"><b>영역별 이해도</b></div>
    ${bars}
    <div class="seg" style="margin-top:16px"><b>맞춤 학습 가이드</b></div>
    ${reco}
  </div>`;
}
function recoText(area){
  const m={
    "V-모델":"왼쪽 정의(요구·설계)와 오른쪽 검증(테스트)이 같은 레벨끼리 대응한다는 그림을 다시 그려 보세요. '이 테스트는 어느 요구를 검증하나?'를 반복해 묻는 습관이 핵심입니다.",
    "ASPICE":"ASPICE는 '결과물'이 아니라 'SW를 만드는 프로세스의 성숙도(Level)'를 본다는 점이 포인트입니다. 규모산정(COCOMO)·인증과 혼동하지 않도록 정리하세요.",
    "기능안전(ISO 26262)":"'산업안전(직원 근무 안전)'과 '기능안전(제품 오작동 안전)'을 구분하세요. 핵심은 'E/E 오작동 위험을 허용 수준까지 낮춘다'입니다.",
    "요구사항 검증성":"'빠르게/우수하게/만족스럽게' 같은 모호한 표현 vs '500ms 이내' 같은 정량 조건의 차이를 익히세요. 측정 가능해야 검증 가능합니다.",
    "추적성 — Missing Test":"요구는 있는데 TC가 0건 = Missing Test. 추적 매트릭스에서 'TC 열이 빈 요구'를 찾는 연습을 해 보세요.",
    "추적성 — Weak Trace":"연결 개수가 아니라 '검증의 깊이'가 추적성의 실질입니다. 정상 케이스만 본 TC(Weak Trace)는 경계값·예외 보강이 필요합니다.",
    "Quality Gate":"'Critical Open + 보완계획 없음 = 통과 불가' 원칙을 기억하세요. 일정 압박과 별개로 위험을 다음 공정으로 넘기지 않는 것이 게이트의 목적입니다.",
    "변경관리":"변경 시 확인 3종: ①영향 범위(요구·설계·TC) ②일정·견적 ③회귀시험. 개인 선호 도구 같은 무관 항목과 구분하세요.",
    "Test Evidence":"'Pass' 글자만으로는 부족합니다. 재현 가능한 증거 3종(실행 로그·SW 버전·시험 환경)을 요구하는 습관을 들이세요.",
    "안전 주장(Safety Case) 종합":"추적·증거·영향분석 결손이 겹치면 안전 주장 자체가 무너집니다. 개별 결함을 넘어 '안전 주장이 통째로 성립하는가'를 판단하는 종합 시야가 필요합니다."
  };
  return m[area]||"해당 영역의 핵심 개념을 교재로 다시 확인해 보세요.";
}

function buildReview(r){

      return `<div class="rev">

        <div class="q">${esc(q.q)}</div>
        <div class="ln"><span class="pk">내 선택: ${NUM[a.picked]}</span> ${esc(q.options[a.picked])}</div>
        ${!ok?`<div class="ln"><span class="an">정답: ${NUM[q.answer]}</span> ${esc(q.options[q.answer])}</div>`:""}
        <div class="ex"><b>해설.</b> ${esc(q.core)}<br><br><b>💼 구매 실무.</b> ${esc(q.realworld)}</div>
      </div>`;
    }).join("")}
  </div>`;
}

    <input type="file" id="fileInput" accept="application/json" multiple class="hidden">
  </div>
  ${results.length? dashBody(results) : `<div class="panel"><div class="empty">
    아직 응시 기록이 없습니다.<br>교육생이 같은 PC에서 응시하면 자동 저장되고,<br>
    다른 PC 결과는 <b>⬆ 결과파일 가져오기</b>로 모을 수 있습니다.</div></div>`}
  `;
  $("#backHome").onclick=()=>{ document.querySelector(".wrap").classList.remove("dash-wrap"); reset(); render(); };
  $("#setBtn").onclick=openSettings;
  $("#importBtn").onclick=()=>$("#fileInput").click();
  $("#fileInput").onchange=onImport;
  $("#exportAllBtn").onclick=exportAll;
  $("#clearBtn").onclick=()=>{ if(confirm("이 PC에 저장된 모든 응시 기록을 삭제할까요? 되돌릴 수 없습니다.")){ saveResults([]); renderDash(); toast("전체 기록을 삭제했습니다."); } };
  if(results.length){
    document.querySelectorAll("th[data-sort]").forEach(th=>{
      th.onclick=()=>{ const k=th.dataset.sort; if(dashSort.key===k)dashSort.dir*=-1; else dashSort={key:k,dir:1}; renderDash(); };
    });
    document.querySelectorAll("tbody tr").forEach(tr=>{
      tr.onclick=()=>openDetail(parseInt(tr.dataset.i));
    });
  }
}

function dashBody(results){
  const n=results.length;
  const scores=results.map(r=>r.score);
  const avg=Math.round(scores.reduce((a,b)=>a+b,0)/n);
  const passed=results.filter(r=>r.score>=PASS_SCORE).length;
  const passRate=Math.round(passed/n*100);
  const avgDur=Math.round(results.reduce((a,r)=>a+r.durationSec,0)/n);
  // 점수 분포
  const buckets=[0,0,0,0,0]; // 0-59,60-69,70-79,80-89,90-100
  scores.forEach(s=>{ if(s<60)buckets[0]++; else if(s<70)buckets[1]++; else if(s<80)buckets[2]++; else if(s<90)buckets[3]++; else buckets[4]++; });
  const bmax=Math.max(...buckets,1);
  const bl=["~59","60-69","70-79","80-89","90-100"];
  const bc=["#dc2626","#d97706","#1d6fb8","#1d6fb8","#16a34a"];
  // 문항별 정답률
  const qstat=QUESTIONS.map((q,i)=>{
    let ok=0; results.forEach(r=>{ if(r.answers[i]&&r.answers[i].correct)ok++; });
    return {i,q,ok,p:Math.round(ok/n*100)};
  });
  // 영역별
  const areaMap={};
  results.forEach(r=>r.answers.forEach(a=>{ areaMap[a.area]=areaMap[a.area]||{ok:0,n:0}; areaMap[a.area].n++; if(a.correct)areaMap[a.area].ok++; }));
  const areaArr=Object.entries(areaMap).map(([k,v])=>({k,p:Math.round(v.ok/v.n*100),ok:v.ok,n:v.n})).sort((a,b)=>a.p-b.p);

  // 정렬
  const sorted=[...results].map((r,origIdx)=>({r,origIdx})).sort((A,B)=>{
    const k=dashSort.key; let av,bv;
    if(k==="name"){av=A.r.name;bv=B.r.name; return dashSort.dir*String(av).localeCompare(String(bv),"ko");}
    av=A.r[k]; bv=B.r[k]; return dashSort.dir*((av>bv?1:av<bv?-1:0));
  });
  const arrow=k=>dashSort.key===k?(dashSort.dir>0?" ▲":" ▼"):"";

  return `
  <div class="dgrid">
    <div class="stat"><div class="n">${n}</div><div class="l">총 응시 인원</div></div>
    <div class="stat"><div class="n">${avg}점</div><div class="l">평균 점수</div></div>
    <div class="stat"><div class="n">${passRate}%</div><div class="l">합격률 (${passed}/${n}명)</div></div>
    <div class="stat"><div class="n">${fmtDur(avgDur)}</div><div class="l">평균 소요시간</div></div>
  </div>

  <div class="panel">
    <h3>📈 점수 분포</h3>
    <div style="display:flex;align-items:flex-end;gap:14px;height:160px;padding:0 8px">
      ${buckets.map((v,i)=>`
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%">
          <div style="font-weight:800;color:var(--navy);font-size:13px;margin-bottom:4px">${v}명</div>
          <div style="width:100%;height:${v/bmax*110}px;min-height:${v?6:0}px;background:${bc[i]};border-radius:8px 8px 0 0;transition:height .5s"></div>
          <div class="small" style="margin-top:6px">${bl[i]}</div>
        </div>`).join("")}
    </div>
    <p class="small" style="text-align:center;margin-top:8px">합격 기준 ${PASS_SCORE}점</p>
  </div>

  <div class="panel">
    <h3>🧩 문항별 정답률 <span class="small">(낮을수록 교육생이 어려워한 문항 → 보충 설명 대상)</span></h3>
    ${qstat.sort((a,b)=>a.p-b.p).map(s=>{
      const col=s.p>=80?"linear-gradient(90deg,#16a34a,#3ddc84)":s.p>=50?"linear-gradient(90deg,#f5b301,#ffce5a)":"linear-gradient(90deg,#dc2626,#f87171)";
      return `<div class="barrow"><span class="nm" style="width:210px">Q${s.i+1}. ${esc(s.q.area)} <span class="diff ${s.q.diff}">${s.q.diff}</span></span>
        <span class="tk"><div style="width:${s.p}%;background:${col}"></div></span>
        <span class="vv">${s.p}%</span></div>`;
    }).join("")}
  </div>

  <div class="panel">
    <h3>🎯 영역별 평균 이해도</h3>
    ${areaArr.map(a=>{
      const col=a.p>=80?"linear-gradient(90deg,#16a34a,#3ddc84)":a.p>=50?"linear-gradient(90deg,#f5b301,#ffce5a)":"linear-gradient(90deg,#dc2626,#f87171)";
      return `<div class="barrow"><span class="nm" style="width:200px">${esc(a.k)}</span>
        <span class="tk"><div style="width:${a.p}%;background:${col}"></div></span>
        <span class="vv">${a.p}%</span></div>`;
    }).join("")}
    ${areaArr[0]&&areaArr[0].p<70?`<div class="reco" style="margin-top:12px">💡 <b>${esc(areaArr[0].k)}</b> 영역의 이해도가 가장 낮습니다. 다음 차수에서 이 부분을 보강 설명하시는 것을 권장합니다.</div>`:""}
  </div>

  <div class="panel">
    <h3>👥 응시자별 상세 <span class="small">(행을 클릭하면 개인 결과를 볼 수 있습니다)</span></h3>
    <table>
      <thead><tr>
        <th data-sort="name">이름/사번${arrow("name")}</th>
        <th data-sort="score">점수${arrow("score")}</th>
        <th>판정</th>
        <th data-sort="durationSec">소요시간${arrow("durationSec")}</th>
        <th data-sort="finishedAt">응시일시${arrow("finishedAt")}</th>
        <th>오답 문항</th>
      </tr></thead>
      <tbody>
        ${sorted.map(({r,origIdx})=>{
          const g=gradeOf(r.score);
          const wrongs=r.answers.map((a,i)=>a.correct?null:("Q"+(i+1))).filter(Boolean);
          return `<tr data-i="${origIdx}">
            <td><b>${esc(r.name)}</b></td>
            <td><span class="scoretag" style="color:${g.c};background:${g.bg}">${r.score}점</span></td>
            <td style="color:${r.score>=PASS_SCORE?'var(--ok)':'var(--no)'};font-weight:700">${r.score>=PASS_SCORE?"합격":"불합격"}</td>
            <td>${fmtDur(r.durationSec)}</td>
            <td class="small">${fmtDate(r.finishedAt)}</td>
            <td class="small">${wrongs.length?wrongs.join(", "):"—"}</td>
          </tr>`;
        }).join("")}
      </tbody>
    </table>
  </div>`;
}

function openDetail(origIdx){
  const r=loadResults()[origIdx];
  if(!r)return;
  const g=gradeOf(r.score);
  const m=document.createElement("div"); m.className="modal";
  m.innerHTML=`<div class="box">
    <button class="x">×</button>
    <h2 style="margin:0 0 4px;color:var(--navy)">${esc(r.name)} 님 상세 결과</h2>
    <p class="small">${fmtDate(r.finishedAt)} · 소요 ${fmtDur(r.durationSec)} ·
      <span class="scoretag" style="color:${g.c};background:${g.bg}">${r.score}점 (${g.g})</span></p>
    ${QUESTIONS.map((q,i)=>{
      const a=r.answers[i]; const ok=a&&a.correct;
      return `<div class="rev">
        <div class="rh"><span>Q${i+1}. ${esc(q.area)} <span class="diff ${q.diff}">${q.diff}</span></span>
          <span class="${ok?"tagok":"tagno"}">${ok?"○ 정답":"✕ 오답"}</span></div>
        <div class="q">${esc(q.q)}</div>
        <div class="ln"><span class="${ok?'an':'pk'}">선택: ${NUM[a.picked]}</span> ${esc(q.options[a.picked])}</div>
        ${!ok?`<div class="ln"><span class="an">정답: ${NUM[q.answer]}</span> ${esc(q.options[q.answer])}</div>`:""}
      </div>`;
    }).join("")}
    <div style="margin-top:14px">${buildReport(r)}</div>
  </div>`;
  document.body.appendChild(m);
  m.querySelector(".x").onclick=()=>m.remove();
  m.onclick=e=>{ if(e.target===m)m.remove(); };
}

function onImport(e){
  const files=[...e.target.files]; if(!files.length)return;
  let added=0, dup=0;
  const all=loadResults();
  const seen=new Set(all.map(r=>r.name+"|"+r.finishedAt));
  let pending=files.length;
  files.forEach(f=>{
    const reader=new FileReader();
    reader.onload=()=>{
      try{
        let data=JSON.parse(reader.result);
        const arr=Array.isArray(data)?data:[data];
        arr.forEach(r=>{
          if(r&&r.name&&r.answers&&typeof r.score==="number"){
            const key=r.name+"|"+r.finishedAt;
            if(seen.has(key)){dup++;return;}
            seen.add(key); all.push(r); added++;
          }
        });
      }catch(err){ toast("파일 형식 오류: "+f.name); }
      if(--pending===0){ saveResults(all); renderDash(); toast(`${added}건 추가${dup?`, ${dup}건 중복 제외`:""}`); }
    };
    reader.readAsText(f);
  });
  e.target.value="";
}
function exportAll(){
  const all=loadResults();
  if(!all.length){toast("내보낼 기록이 없습니다.");return;}
  const blob=new Blob([JSON.stringify(all,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download=`이해도평가_전체결과_${all.length}건.json`; a.click(); URL.revokeObjectURL(a.href);
  toast("전체 결과를 저장했습니다.");
}

/* =======================================================================
   SETTINGS (선택적 Claude API)
======================================================================= */
function openSettings(){
  const set=loadSettings();
  const m=document.createElement("div"); m.className="modal";
  m.innerHTML=`<div class="box" style="max-width:520px">
    <button class="x">×</button>
    <h2 style="margin:0 0 6px;color:var(--navy)">⚙ 설정 · (선택) AI 튜터</h2>
    <p class="small">기본 해설·진단 리포트는 <b>API 키 없이</b> 작동합니다.<br>
    아래에 Anthropic API 키를 입력하면, 문항 피드백 화면에 <b>'AI 튜터에게 추가 질문'</b> 기능이 켜집니다.
    키는 이 브라우저에만 저장되며 외부로 전송되지 않습니다(질문 시 Anthropic API에만 직접 호출).</p>
    <div class="settings-row">
      <label class="small"><b>Anthropic API Key</b> (sk-ant-...)</label>
      <input class="input" id="apiKey" type="password" placeholder="sk-ant-..." value="${esc(set.apiKey||"")}">
    </div>
    <div class="settings-row">
      <label class="small"><b>모델</b></label>
      <select class="input" id="model">
        ${[["claude-opus-4-8","Opus 4.8 (최고 성능)"],["claude-sonnet-4-6","Sonnet 4.6 (균형)"],["claude-haiku-4-5-20251001","Haiku 4.5 (빠름·저렴)"]]
          .map(([v,l])=>`<option value="${v}" ${set.model===v?"selected":""}>${l}</option>`).join("")}
      </select>
    </div>
    <div class="btnrow">
      <button class="cta" id="saveSet" style="margin-top:6px">저장</button>
      <button class="ghost" id="clearSet" style="margin-top:6px">키 삭제</button>
    </div>
    <p class="small" style="margin-top:10px">⚠ 사내 보안정책에 따라 외부 API 호출이 차단될 수 있습니다. 그 경우 내장형 해설만 사용하세요.</p>
  </div>`;
  document.body.appendChild(m);
  m.querySelector(".x").onclick=()=>m.remove();
  m.onclick=e=>{ if(e.target===m)m.remove(); };
  $("#saveSet").onclick=()=>{ saveSettings({apiKey:$("#apiKey").value.trim(),model:$("#model").value}); m.remove(); toast("설정을 저장했습니다."); if(state.view==="quiz"&&state.locked)render(); };
  $("#clearSet").onclick=()=>{ saveSettings({}); m.remove(); toast("API 키를 삭제했습니다."); };
}

/* =======================================================================
   ROUTER
======================================================================= */
function render(){
  if(state.view!=="dash")document.querySelector(".wrap").classList.remove("dash-wrap");
  switch(state.view){
    case "home": renderHome(); break;
    case "quiz": renderQuiz(); break;
    case "result": renderResult(); break;
    case "dash": renderDash(); break;
    default: renderHome();
  }
}
render();
</script>
</body>
